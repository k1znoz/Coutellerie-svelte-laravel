[build][build]

builder = "nixpacks"builder = "RAILPACK"

[build.variables]
# Extensions PHP essentielles pour Laravel + Filament
RAILPACK_PHP_EXTENSIONS = "intl,zip,gd,bcmath,mbstring,xml,curl,pdo_mysql"

[deploy]
# Script d'initialisation après que RAILPACK ait tout installé
preDeployCommand = "chmod +x ./railway/init-app.sh && sh ./railway/init-app.sh"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"

# Variables gérées directement dans Railway Dashboard
# Utilise les variables partagées et références MySQL configurées

[environments.production.volumes]
"/app/storage" = { size = "1GB", mount = "/app/storage" }