[build]
builder = "RAILPACK"
buildCommand = "composer install --optimize-autoloader --no-dev --ignore-platform-reqs"

[build.variables]
RAILPACK_PHP_EXTENSIONS = "gd,imagick,intl,zip"

[deploy]
startCommand = "./start.sh"

[environments.production.variables]
APP_ENV = "production"
APP_DEBUG = "false"
LOG_CHANNEL = "stderr"
LOG_LEVEL = "info"
SESSION_DRIVER = "database"
CACHE_DRIVER = "database"
QUEUE_CONNECTION = "database"
BROADCAST_DRIVER = "log"
MAIL_MAILER = "log"

[environments.production.volumes]
# Volume pour le stockage des fichiers uploadés
"/app/storage" = { size = "1GB", mount = "/app/storage" }