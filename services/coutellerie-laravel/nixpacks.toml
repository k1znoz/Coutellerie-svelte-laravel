# nixpacks.toml

[phases.setup]
# Add required PHP extensions for Laravel and Filament
nixPkgs = [
    "php83Extensions.intl",
    "php83Extensions.zip",
    "php83Extensions.gd",
    "php83Extensions.bcmath",
    "php83Extensions.mbstring",
    "php83Extensions.xml",
    "php83Extensions.curl",
    "php83Extensions.pdo_mysql"
]

[phases.install]
cmds = ["composer install --no-dev --no-scripts"]

[phases.build]
cmds = ["php artisan key:generate --force", "php artisan migrate --force"]

[start]
command = "php artisan serve --host=0.0.0.0 --port=$PORT"
