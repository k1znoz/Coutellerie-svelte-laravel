[build]
builder = "RAILPACK"

[build.variables]
# Extensions PHP essentielles pour Laravel + Filament
RAILPACK_PHP_EXTENSIONS = "intl,zip,gd,bcmath,mbstring,xml,curl,pdo_mysql"

[deploy]
# Script d'initialisation après que RAILPACK ait tout installé
preDeployCommand = "chmod +x ./railway/init-app.sh && sh ./railway/init-app.sh"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"

[environments.production.variables]
APP_ENV = "production"
APP_DEBUG = "false"
APP_URL = "${{ RAILWAY_PUBLIC_DOMAIN }}"
# Logs structurés pour Railway
LOG_CHANNEL = "stderr" 
LOG_STDERR_FORMATTER = "Monolog\\Formatter\\JsonFormatter"
# Base de données MySQL
DB_CONNECTION = "mysql"
DB_URL = "${{ DATABASE_URL }}"
# Configuration simple
SESSION_DRIVER = "database"
CACHE_DRIVER = "database" 
QUEUE_CONNECTION = "sync"
FILESYSTEM_DISK = "local"

[environments.production.volumes]
"/app/storage" = { size = "1GB", mount = "/app/storage" }